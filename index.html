<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IG Tracker – Multi-profile</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
  :root {
    --bg: #0a0a0f; --bg2: #12121a; --bg3: #1a1a26;
    --border: #2a2a3d; --accent: #c13584; --accent2: #833ab4;
    --accent3: #fd1d1d; --gold: #fcb045; --text: #f0f0f5;
    --muted: #7070a0; --green: #22c55e; --red: #ef4444;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100vh; padding: 24px;
  }

  /* HEADER */
  .header { display: flex; align-items: center; gap: 16px; margin-bottom: 32px; }
  .logo {
    width: 44px; height: 44px;
    background: linear-gradient(135deg, var(--gold), var(--accent3), var(--accent), var(--accent2));
    border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 22px;
  }
  .header h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
  .header p { color: var(--muted); font-size: 13px; margin-top: 2px; }
  .header-right { margin-left: auto; display: flex; gap: 10px; align-items: center; }
  .btn {
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    border: none; color: #fff; padding: 8px 18px;
    border-radius: 10px; cursor: pointer; font-size: 13px; font-weight: 600; transition: opacity 0.15s;
  }
  .btn:hover { opacity: 0.85; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-ghost {
    background: var(--bg3); border: 1px solid var(--border);
    color: var(--muted); padding: 8px 16px;
    border-radius: 10px; cursor: pointer; font-size: 13px; transition: all 0.15s;
  }
  .btn-ghost:hover { border-color: var(--accent); color: var(--text); }
  .btn-sm {
    background: var(--bg3); border: 1px solid var(--border);
    color: var(--muted); padding: 5px 12px;
    border-radius: 8px; cursor: pointer; font-size: 12px; transition: all 0.15s;
  }
  .btn-sm:hover { border-color: var(--accent); color: var(--text); }

  /* PROFILE CARDS */
  .profiles-list { display: flex; flex-direction: column; gap: 16px; }

  /* 3 čtverečky vedle sebe */
  .profiles-grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px;
  }
  @media (max-width: 700px) { .profiles-grid { grid-template-columns: 1fr; } }

  .profile-card {
    background: var(--bg2); border: 2px solid var(--border);
    border-radius: 20px; padding: 24px 20px; cursor: pointer;
    transition: border-color 0.2s, background 0.2s; user-select: none;
    display: flex; flex-direction: column; align-items: center; text-align: center; gap: 12px;
    min-height: 180px; justify-content: center;
  }
  .profile-card:hover { border-color: rgba(193,53,132,0.4); background: rgba(193,53,132,0.04); }
  .profile-card.active { border-color: rgba(193,53,132,0.7); background: rgba(193,53,132,0.08); }

  .profile-emoji { font-size: 36px; }
  .profile-handle { font-size: 15px; font-weight: 700; }
  .profile-label { font-size: 12px; color: var(--muted); }

  .profile-stats { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; }
  .pstat { text-align: center; }
  .pstat-val { font-size: 20px; font-weight: 800; letter-spacing: -0.5px; }
  .pstat-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }

  .growth-badge {
    background: rgba(34,197,94,0.15); color: var(--green);
    font-size: 11px; font-weight: 700; padding: 2px 8px;
    border-radius: 20px; white-space: nowrap; cursor: default;
  }
  .growth-badge.neg { background: rgba(239,68,68,0.15); color: var(--red); }

  /* Detail panel pod gridem */
  .profile-detail-panel {
    display: none; background: var(--bg2); border: 1px solid rgba(193,53,132,0.3);
    border-radius: 20px; padding: 24px;
  }
  .profile-detail-panel.open { display: block; }

  /* LOADING STATE INSIDE DETAIL */
  .detail-loading { text-align: center; padding: 40px; color: var(--muted); }

  /* STAT CARDS */
  .stats-grid {
    display: grid; grid-template-columns: repeat(2, 1fr);
    gap: 16px; margin-bottom: 24px;
  }
  @media (max-width: 700px) { .stats-grid { grid-template-columns: 1fr; } }
  .card {
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: 16px; padding: 20px;
  }
  .card-label {
    font-size: 12px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.8px; color: var(--muted); margin-bottom: 8px;
  }
  .card-value { font-size: 36px; font-weight: 800; letter-spacing: -1.5px; }
  .card-delta { font-size: 13px; margin-top: 6px; }
  .delta-pos { color: var(--green); }
  .delta-neg { color: var(--red); }
  .delta-neu { color: var(--muted); }
  .card-icon {
    width: 36px; height: 36px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; margin-bottom: 12px;
  }
  .icon-pink { background: rgba(193,53,132,0.15); }
  .icon-gold  { background: rgba(252,176,69,0.15); }
  .top-reel-link {
    display: inline-flex; align-items: center; gap: 6px; margin-top: 10px;
    color: var(--accent); font-size: 12px; font-weight: 600;
    text-decoration: none; background: rgba(193,53,132,0.1);
    border: 1px solid rgba(193,53,132,0.3); padding: 5px 12px;
    border-radius: 8px; transition: all 0.15s;
  }
  .top-reel-link:hover { background: rgba(193,53,132,0.2); }

  /* CHART */
  .chart-card {
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: 16px; padding: 20px; margin-bottom: 24px;
  }
  .chart-title { font-size: 14px; font-weight: 700; margin-bottom: 16px; }
  .chart-wrap { position: relative; height: 220px; }

  /* BOTTOM GRID */
  .bottom-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
  @media (max-width: 900px) { .bottom-grid { grid-template-columns: 1fr; } }
  .section-card {
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: 16px; padding: 20px;
  }
  .section-header {
    display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;
  }
  .section-title { font-size: 14px; font-weight: 700; }

  /* REELS LIST */
  .reel-item {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.04);
  }
  .reel-item:last-child { border-bottom: none; }
  .reel-num {
    width: 22px; height: 22px; border-radius: 6px; background: var(--bg2);
    color: var(--muted); font-size: 11px; font-weight: 700;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .reel-info { flex: 1; min-width: 0; }
  .reel-views { font-size: 15px; font-weight: 700; }
  .reel-label { font-size: 11px; color: var(--muted); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .reel-link { color: var(--accent); text-decoration: none; font-size: 18px; flex-shrink: 0; opacity: 0.8; transition: opacity 0.15s; }
  .reel-link:hover { opacity: 1; }

  /* PLÁN */
  .plan-days { display: flex; flex-direction: column; gap: 8px; }
  .plan-day {
    display: flex; align-items: flex-start; gap: 10px; padding: 10px 12px;
    border-radius: 10px; background: var(--bg2); border: 1px solid var(--border);
    cursor: pointer; transition: border-color 0.15s;
  }
  .plan-day:hover { border-color: rgba(193,53,132,0.4); }
  .plan-day.has-note { border-color: rgba(193,53,132,0.25); }
  .plan-day.today { background: rgba(193,53,132,0.08); border-color: rgba(193,53,132,0.4); }
  .plan-date-label { flex-shrink: 0; min-width: 72px; }
  .plan-date-today { font-size: 10px; color: var(--accent); font-weight: 700; letter-spacing: 0.5px; }
  .plan-date-day { font-size: 13px; font-weight: 700; }
  .plan-date-dow { font-size: 11px; color: var(--muted); }
  .plan-note-text { font-size: 12px; color: var(--text); flex: 1; line-height: 1.5; }
  .plan-note-empty { font-size: 12px; color: var(--muted); flex: 1; font-style: italic; }
  .plan-edit-btn { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 14px; flex-shrink: 0; transition: color 0.15s; }
  .plan-edit-btn:hover { color: var(--accent); }

  /* LOG TABLE */
  .log-card { background: var(--bg3); border: 1px solid var(--border); border-radius: 16px; padding: 20px; margin-bottom: 24px; }
  .log-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0; }
  .log-title { font-size: 14px; font-weight: 700; }
  .log-toggle-btn { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 13px; display: flex; align-items: center; gap: 6px; transition: color 0.15s; }
  .log-toggle-btn:hover { color: var(--text); }
  .log-body { margin-top: 16px; }
  table { width: 100%; border-collapse: collapse; }
  th { text-align: left; padding: 8px 12px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.7px; color: var(--muted); border-bottom: 1px solid var(--border); }
  td { padding: 10px 12px; font-size: 13px; border-bottom: 1px solid rgba(255,255,255,0.04); }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(255,255,255,0.02); }
  .tag-pos { color: var(--green); font-weight: 600; }
  .tag-neg { color: var(--red); font-weight: 600; }
  .tag-neu { color: var(--muted); }

  /* MODALS */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.75); backdrop-filter: blur(4px);
    z-index: 100; align-items: center; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 20px; padding: 28px; width: 100%; max-width: 420px; position: relative;
  }
  .modal h2 { font-size: 18px; font-weight: 700; margin-bottom: 20px; }
  .form-group { margin-bottom: 16px; }
  .form-group label { display: block; font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.7px; margin-bottom: 6px; }
  .form-group input, .form-group textarea {
    width: 100%; background: var(--bg3); border: 1px solid var(--border);
    color: var(--text); padding: 10px 14px; border-radius: 10px; font-size: 15px;
    outline: none; transition: border-color 0.15s; font-family: inherit;
  }
  .form-group textarea { resize: vertical; min-height: 90px; }
  .form-group input:focus, .form-group textarea:focus { border-color: var(--accent); }
  .form-group input::placeholder, .form-group textarea::placeholder { color: var(--muted); }
  .modal-footer { display: flex; gap: 10px; margin-top: 20px; justify-content: flex-end; }
  .modal-close { position: absolute; top: 16px; right: 16px; background: none; border: none; color: var(--muted); cursor: pointer; font-size: 20px; }
  .modal-close:hover { color: var(--text); }
  input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(0.5); }

  .empty { text-align: center; padding: 30px; color: var(--muted); }
  .grad { background: linear-gradient(90deg, var(--accent), var(--gold)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  [data-tip] { position: relative; }
  [data-tip]::after { content: attr(data-tip); position: absolute; bottom: calc(100% + 6px); left: 0; background: #1e1e2e; color: #e2e8f0; font-size: 11px; font-weight: 500; padding: 5px 9px; border-radius: 8px; white-space: nowrap; pointer-events: none; opacity: 0; transition: opacity 0s; z-index: 99; border: 1px solid rgba(255,255,255,0.1); }
  [data-tip]:hover::after { opacity: 1; }
  .streak-badge { background: linear-gradient(135deg, var(--gold), var(--accent3)); color: #000; font-weight: 700; font-size: 12px; padding: 4px 10px; border-radius: 20px; display: inline-flex; align-items: center; gap: 4px; }

  /* LOADING */
  .loading-overlay {
    position: fixed; inset: 0; background: var(--bg);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    z-index: 200; gap: 16px;
  }
  .spinner {
    width: 40px; height: 40px; border: 3px solid var(--border);
    border-top-color: var(--accent); border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  .spinner-sm {
    width: 24px; height: 24px; border: 2px solid var(--border);
    border-top-color: var(--accent); border-radius: 50%;
    animation: spin 0.8s linear infinite; display: inline-block;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { color: var(--muted); font-size: 14px; }

  /* TOAST */
  .toast {
    position: fixed; bottom: 24px; right: 24px;
    background: var(--bg3); border: 1px solid var(--border);
    color: var(--text); padding: 12px 20px; border-radius: 12px;
    font-size: 13px; font-weight: 500; z-index: 300;
    opacity: 0; transform: translateY(8px);
    transition: all 0.25s; pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateY(0); }
  .toast.err { border-color: var(--red); color: var(--red); }

  /* DETAIL HEADER */
  .detail-header {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 20px; padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }
  .detail-header-info { flex: 1; }
  .detail-header-info h3 { font-size: 16px; font-weight: 700; }
  .detail-header-info p { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .detail-actions { display: flex; gap: 8px; align-items: center; }

  /* EXTRA CARDS ROW */
  .cards-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; margin-bottom: 24px; }
  @media (max-width: 900px) { .cards-row { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<!-- LOADING -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <div class="loading-text">Načítám data…</div>
</div>

<div id="appContent" style="display:none">

<div class="header">
  <div class="logo">📸</div>
  <div>
    <h1 class="grad">IG Tracker</h1>
    <p>Správa 3 Instagram profilů</p>
  </div>
  <div class="header-right">
    <button class="btn-ghost" onclick="location.reload()" title="Obnovit" style="font-size:16px;padding:8px 12px;">↻</button>
  </div>
</div>

<div class="profiles-list">
  <div class="profiles-grid" id="profilesGrid"></div>
  <div class="profile-detail-panel" id="profileDetailPanel"></div>
</div>

</div><!-- /appContent -->

<!-- LOG MODAL -->
<div class="modal-overlay" id="logModal">
  <div class="modal">
    <button class="modal-close" onclick="closeLogModal()">✕</button>
    <h2>+ Přidat záznam</h2>
    <div class="form-group"><label>Datum</label><input type="date" id="logDate"></div>
    <div class="form-group"><label>Sledující</label><input type="number" id="logFollowers" placeholder="např. 1240"></div>
    <div class="form-group"><label>Poznámka (volitelné)</label><input type="text" id="logNote" placeholder="např. viral reel, collab..."></div>
    <div class="modal-footer">
      <button class="btn-ghost" onclick="closeLogModal()">Zrušit</button>
      <button class="btn" id="saveLogBtn" onclick="saveLog()">Uložit</button>
    </div>
  </div>
</div>

<!-- REEL MODAL -->
<div class="modal-overlay" id="reelModal">
  <div class="modal">
    <button class="modal-close" onclick="closeReelModal()">✕</button>
    <h2>🎥 Přidat reel</h2>
    <div class="form-group"><label>URL reelu</label><input type="text" id="reelUrl" placeholder="https://www.instagram.com/reel/..."></div>
    <div class="form-group"><label>Views</label><input type="number" id="reelViews" placeholder="např. 47100"></div>
    <div class="form-group"><label>Likes</label><input type="number" id="reelLikes" placeholder="např. 452"></div>
    <div class="form-group"><label>Datum vydání (volitelné)</label><input type="date" id="reelPostedAt"></div>
    <div class="form-group"><label>Popis (volitelné)</label><input type="text" id="reelDesc" placeholder="např. challenge, sprcha reel..."></div>
    <div class="modal-footer">
      <button class="btn-ghost" onclick="closeReelModal()">Zrušit</button>
      <button class="btn" id="saveReelBtn" onclick="saveReel()">Uložit</button>
    </div>
  </div>
</div>

<!-- PLAN MODAL -->
<div class="modal-overlay" id="planModal">
  <div class="modal">
    <button class="modal-close" onclick="closePlanModal()">✕</button>
    <h2 id="planModalTitle">📅 Plán</h2>
    <div class="form-group"><label>Co plánuješ?</label>
      <textarea id="planNote" placeholder="např. natočit reel, odpovědět na DMs..."></textarea>
    </div>
    <div class="modal-footer">
      <button class="btn-ghost" onclick="clearPlanNote()">Smazat</button>
      <button class="btn-ghost" onclick="closePlanModal()">Zrušit</button>
      <button class="btn" id="savePlanBtn" onclick="savePlanNote()">Uložit</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ── SUPABASE ──────────────────────────────────────────────────────────
const SB_URL = 'https://tolfunyrkqvjoscepkzw.supabase.co';
const SB_KEY = 'sb_publishable_g4_Zrm9SJSFZICzBao-AmA_hfcMxftQ';
const sb = window.supabase.createClient(SB_URL, SB_KEY);

// ── PROFILES CONFIG ───────────────────────────────────────────────────
const PROFILES = [
  { handle: 'stelinkax',    label: 'Stela',    emoji: '⭐' },
  { handle: 'laurriii.x',  label: 'Lauri #1', emoji: '💫' },
  { handle: '_laurinkaa2_', label: 'Lauri #2', emoji: '🌸' },
];

// ── STATE ──────────────────────────────────────────────────────────────
// Per-profile state, keyed by handle
const profileState = {};
PROFILES.forEach(p => {
  profileState[p.handle] = { logs: [], reels: [], plan: {}, loaded: false, charts: {} };
});

// Global modal context
let _modalHandle = '';
let _planKey = '';

// ── FORMAT ────────────────────────────────────────────────────────────
function fmt(n) {
  if (!n && n !== 0) return '—';
  if (n >= 1000000) return (n/1000000).toFixed(1) + 'M';
  if (n >= 1000)    return (n/1000).toFixed(1) + 'K';
  return n.toLocaleString('cs');
}
function deltaHtml(val) {
  if (val === null || val === undefined) return '<span class="delta-neu">—</span>';
  const sign = val > 0 ? '+' : '';
  const cls  = val > 0 ? 'delta-pos' : val < 0 ? 'delta-neg' : 'delta-neu';
  const arr  = val > 0 ? '▲' : val < 0 ? '▼' : '●';
  return `<span class="${cls}">${arr} ${sign}${fmt(val)} vs. předchozí den</span>`;
}

// ── TOAST ─────────────────────────────────────────────────────────────
function toast(msg, err = false) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show' + (err ? ' err' : '');
  clearTimeout(el._t);
  el._t = setTimeout(() => { el.className = 'toast'; }, 3000);
}

// ── LOAD SUMMARY (all profiles in parallel) ───────────────────────────
async function loadAllSummaries() {
  const results = await Promise.all(PROFILES.map(async p => {
    const [logsRes, reelsRes] = await Promise.all([
      sb.from('logs').select('date,followers').eq('profile', p.handle).order('date', { ascending: true }),
      sb.from('reels').select('views,posted_at').eq('profile', p.handle),
    ]);
    return {
      handle: p.handle,
      logs: logsRes.data || [],
      reels: reelsRes.data || [],
    };
  }));
  return results;
}

// ── LOAD DETAIL (single profile) ─────────────────────────────────────
async function loadProfileDetail(handle) {
  const [logsRes, reelsRes, planRes] = await Promise.all([
    sb.from('logs').select('*').eq('profile', handle).order('date', { ascending: true }),
    sb.from('reels').select('*').eq('profile', handle).order('posted_at', { ascending: false }),
    sb.from('plan').select('*').eq('profile', handle).order('date', { ascending: true }),
  ]);
  if (logsRes.error)  throw logsRes.error;
  if (reelsRes.error) throw reelsRes.error;
  // plan errors are non-fatal
  const state = profileState[handle];
  state.logs  = logsRes.data  || [];
  state.reels = reelsRes.data || [];
  state.plan  = {};
  (planRes.data || []).forEach(p => { state.plan[p.date] = p.note; });
  state.loaded = true;
}

// ── SEED PLAN (new profiles) ─────────────────────────────────────────
async function seedPlan(handle) {
  const state = profileState[handle];
  const DEFAULT_NOTE = '🧪 9:00 – trial reel\n📹 19:00 – normální reel';
  const today = new Date();
  const planRows = [];
  for (let i = 0; i < 30; i++) {
    const d = new Date(today);
    d.setDate(today.getDate() + i);
    const key = d.toISOString().split('T')[0];
    if (!state.plan[key]) {
      planRows.push({ date: key, profile: handle, note: DEFAULT_NOTE });
      state.plan[key] = DEFAULT_NOTE;
    }
  }
  if (planRows.length) {
    await sb.from('plan').upsert(planRows, { onConflict: 'date,profile' });
  }
}

// ── STREAK ────────────────────────────────────────────────────────────
function calcStreak(logs) {
  if (!logs.length) return 0;
  const s = [...logs].sort((a,b) => b.date.localeCompare(a.date));
  let n = 1;
  for (let i = 1; i < s.length; i++) {
    const diff = (new Date(s[i-1].date) - new Date(s[i].date)) / 86400000;
    if (diff === 1) n++; else break;
  }
  return n;
}

// ── RENDER MAIN PROFILES LIST ─────────────────────────────────────────
function renderProfilesList(summaries) {
  const grid = document.getElementById('profilesGrid');
  grid.innerHTML = '';
  PROFILES.forEach((p) => {
    const sum = summaries.find(s => s.handle === p.handle) || { logs: [], reels: [] };
    const sortedLogs = [...sum.logs].sort((a,b) => a.date.localeCompare(b.date));
    const last = sortedLogs[sortedLogs.length - 1];
    const prev7cut = new Date(); prev7cut.setDate(prev7cut.getDate() - 7);
    const base7 = [...sortedLogs].reverse().find(l => new Date(l.date) <= prev7cut);
    let growthBadge = '';
    if (last && base7 && base7.followers > 0) {
      const pct = ((last.followers - base7.followers) / base7.followers * 100);
      const cls = pct >= 0 ? '' : ' neg';
      const sign = pct >= 0 ? '+' : '';
      growthBadge = `<div class="growth-badge${cls}" data-tip="Sledující: ${base7.followers.toLocaleString('cs')} → ${last.followers.toLocaleString('cs')}">${sign}${pct.toFixed(1)}%</div>`;
    }
    const avgViews = sum.reels.length
      ? Math.round(sum.reels.reduce((s,r) => s + (r.views||0), 0) / sum.reels.length)
      : null;

    const card = document.createElement('div');
    card.className = 'profile-card';
    card.id = 'card-' + p.handle;
    card.onclick = () => toggleAccordion(p.handle);
    card.innerHTML = `
      <div class="profile-emoji">${p.emoji}</div>
      <div>
        <div class="profile-handle">@${p.handle}</div>
        <div class="profile-label">${p.label}</div>
      </div>
      <div class="profile-stats">
        <div class="pstat">
          <div class="pstat-val">${last ? fmt(last.followers) : '—'}</div>
          <div class="pstat-label">Sledující</div>
        </div>
        <div class="pstat">
          <div class="pstat-val">${avgViews !== null ? fmt(avgViews) : '—'}</div>
          <div class="pstat-label">Ø Views</div>
        </div>
      </div>
      ${growthBadge}
    `;
    grid.appendChild(card);
  });
}

// ── TOGGLE ACCORDION ──────────────────────────────────────────────────
let activeHandle = null;

async function toggleAccordion(handle) {
  const panel = document.getElementById('profileDetailPanel');

  // Kliknutí na stejnou kartu → zavřít
  if (activeHandle === handle) {
    activeHandle = null;
    document.querySelectorAll('.profile-card').forEach(c => c.classList.remove('active'));
    panel.classList.remove('open');
    panel.innerHTML = '';
    return;
  }

  // Aktivuj kartu
  activeHandle = handle;
  document.querySelectorAll('.profile-card').forEach(c => c.classList.remove('active'));
  document.getElementById('card-' + handle)?.classList.add('active');
  panel.classList.add('open');

  const state = profileState[handle];
  if (!state.loaded) {
    panel.innerHTML = '<div class="detail-loading"><div class="spinner-sm"></div> Načítám detail…</div>';
    try {
      await loadProfileDetail(handle);
      await seedPlan(handle);
    } catch(e) {
      panel.innerHTML = '<div class="detail-loading" style="color:var(--red)">Chyba: ' + e.message + '</div>';
      return;
    }
  }
  renderDetail(handle);
}

// ── RENDER DETAIL PANEL ───────────────────────────────────────────────
function renderDetail(handle) {
  const state  = profileState[handle];
  const prof   = PROFILES.find(p => p.handle === handle);
  const { logs, reels, plan } = state;
  const sorted = [...logs].sort((a,b) => a.date.localeCompare(b.date));
  const last   = sorted[sorted.length - 1];
  const prev   = sorted[sorted.length - 2];
  const detail = document.getElementById('profileDetailPanel');

  // Streak
  const streak = calcStreak(logs);
  const streakHtml = streak >= 2
    ? `<span class="streak-badge">🔥 ${streak} dní</span>`
    : '';

  // Last sync
  const lastSyncLabel = last
    ? 'Sync: ' + new Date(last.date).toLocaleDateString('cs', { day: 'numeric', month: 'numeric', year: 'numeric' })
    : 'Žádná data';

  // 7d growth badge
  let g7Html = '';
  if (last) {
    const cutoff = new Date(last.date);
    cutoff.setDate(cutoff.getDate() - 7);
    const base7 = [...sorted].reverse().find(l => new Date(l.date) <= cutoff);
    if (base7 && base7.followers > 0 && last.followers > base7.followers) {
      const pct = ((last.followers - base7.followers) / base7.followers * 100).toFixed(1);
      g7Html = `<div style="background:rgba(34,197,94,0.15);color:#22c55e;font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px;width:fit-content;margin-top:4px;cursor:default"
        data-tip="Flws za 7 dní: ${base7.followers.toLocaleString('cs')} → ${last.followers.toLocaleString('cs')}">+${pct}%</div>`;
    }
  }

  // Followers delta
  const follDeltaHtml = last
    ? (prev ? deltaHtml(last.followers - prev.followers) : '<span class="delta-neu">První záznam</span>')
    : '<span class="delta-neu">Žádná data</span>';

  // Top reel
  let topReelHtml = '<div class="card-value">—</div>';
  if (reels.length) {
    const top = [...reels].sort((a,b) => b.views - a.views)[0];
    topReelHtml = `
      <div class="card-value">${fmt(top.views)}</div>
      <div class="card-delta" style="color:var(--muted);font-size:12px;margin-top:6px">${top.likes ? `❤️ ${fmt(top.likes)} likes · ${top.description || ''}` : top.description || ''}</div>
      <a class="top-reel-link" href="${top.url}" target="_blank">↗ Otevřít reel</a>
    `;
  }

  // Worst reel
  let worstReelHtml = '<div class="card-value">—</div><div class="card-delta" style="color:var(--muted);font-size:12px;margin-top:6px">Žádný reel starší 3 dní</div>';
  if (reels.length) {
    const threeDaysAgo = new Date(); threeDaysAgo.setDate(threeDaysAgo.getDate() - 3);
    const worst = [...reels].filter(r => r.views > 0 && r.posted_at && new Date(r.posted_at) < threeDaysAgo).sort((a,b) => a.views - b.views)[0];
    if (worst) {
      const desc = worst.description ? `${worst.description} · ❤️ ${fmt(worst.likes||0)}` : `❤️ ${fmt(worst.likes||0)} likes`;
      worstReelHtml = `
        <div class="card-value">${fmt(worst.views)}</div>
        <div class="card-delta" style="color:var(--muted);font-size:12px;margin-top:6px">${desc}</div>
        <a class="top-reel-link" href="${worst.url}" target="_blank" style="border-color:rgba(239,68,68,0.3);color:var(--red);background:rgba(239,68,68,0.08)">↗ Otevřít reel</a>
      `;
    }
  }

  // Avg views card
  let avgCardHtml = '';
  if (reels.length) {
    const cutoff7  = Date.now() - 7  * 86400000;
    const cutoff14 = Date.now() - 14 * 86400000;
    const recent   = reels.filter(r => r.posted_at && new Date(r.posted_at).getTime() >= cutoff7);
    const prev7r   = reels.filter(r => r.posted_at && new Date(r.posted_at).getTime() >= cutoff14 && new Date(r.posted_at).getTime() < cutoff7);
    const totalAvg = Math.round(reels.reduce((s,r) => s + r.views, 0) / reels.length);
    const avg7     = recent.length ? Math.round(recent.reduce((s,r) => s + r.views, 0) / recent.length) : null;
    const avgPrev  = prev7r.length ? Math.round(prev7r.reduce((s,r) => s + r.views, 0) / prev7r.length) : null;

    function deltaBadge(newAvg, oldAvg, tipNew, tipOld) {
      if (newAvg && oldAvg && oldAvg > 0) {
        const pct = ((newAvg - oldAvg) / oldAvg * 100);
        const bg  = pct > 0 ? 'rgba(34,197,94,0.15)' : 'rgba(239,68,68,0.15)';
        const col = pct > 0 ? 'var(--green)' : 'var(--red)';
        return `<span style="display:inline-block;font-size:12px;font-weight:700;padding:3px 9px;border-radius:20px;background:${bg};color:${col}"
          data-tip="${tipNew}: ø ${fmt(newAvg)} views vs ${tipOld}: ø ${fmt(oldAvg)} views"
          >${pct > 0 ? '+' : ''}${pct.toFixed(1)}%</span>`;
      }
      return '';
    }

    avgCardHtml = `
      <div class="card-icon" style="background:rgba(131,58,180,0.15)">📊</div>
      <div class="card-label">Průměrné views <span style="font-weight:400;text-transform:none;letter-spacing:0">· ${reels.length} reelů</span></div>
      <div style="display:flex;align-items:baseline;gap:8px;flex-wrap:wrap">
        <div class="card-value">${fmt(totalAvg)}</div>
        ${deltaBadge(avg7, totalAvg, 'posl. 7 dní', 'celkový průměr')}
      </div>
      <div style="font-size:11px;color:var(--muted);margin-top:4px">celkem za všechny reely</div>
      <div style="height:1px;background:var(--border);margin:12px 0"></div>
      <div style="display:flex;align-items:baseline;gap:8px;flex-wrap:wrap">
        <div style="font-size:22px;font-weight:800;letter-spacing:-0.5px">${avg7 !== null ? fmt(avg7) : '—'}</div>
        ${deltaBadge(avg7, avgPrev, 'posl. 7 dní', 'předch. 7 dní')}
      </div>
      <div style="font-size:11px;color:var(--muted);margin-top:4px">za posledních 7 dní</div>
    `;
  } else {
    avgCardHtml = `
      <div class="card-icon" style="background:rgba(131,58,180,0.15)">📊</div>
      <div class="card-label">Průměrné views</div>
      <div class="card-value">—</div>
    `;
  }

  // Total views / likes / comments
  const tv = reels.reduce((s,r) => s + (r.views||0), 0);
  const tl = reels.reduce((s,r) => s + (r.likes||0), 0);
  const tc = reels.reduce((s,r) => s + (r.comments||0), 0);

  // Daily growth
  const dailyDiff = (curr, prev) => {
    if (curr != null && prev != null) {
      const d = curr - prev;
      const sign = d > 0 ? '+' : '';
      const col = d > 0 ? 'var(--green)' : d < 0 ? 'var(--red)' : 'var(--muted)';
      return `<span style="color:${col}">${sign}${fmt(d)}</span>`;
    }
    return `<span style="color:var(--muted)">${fmt(curr) ?? '—'}</span>`;
  };
  const dailyVal = (v) => `<span style="color:var(--text)">${fmt(v) ?? '—'}</span>`;

  let dailyHtml = '';
  let dailySubtitle = '';
  const todayLog = sorted[sorted.length - 1];
  if (todayLog) {
    if (sorted.length >= 2) {
      const yestLog = sorted[sorted.length - 2];
      dailyHtml = `
        <div><div style="font-size:28px;font-weight:800;letter-spacing:-1px">${dailyDiff(todayLog.total_views, yestLog.total_views)}</div><div style="font-size:11px;color:var(--muted);margin-top:2px">views dnes</div></div>
        <div><div style="font-size:28px;font-weight:800;letter-spacing:-1px">${dailyDiff(todayLog.total_likes, yestLog.total_likes)}</div><div style="font-size:11px;color:var(--muted);margin-top:2px">likes dnes</div></div>
        <div><div style="font-size:28px;font-weight:800;letter-spacing:-1px">${dailyDiff(todayLog.total_comments, yestLog.total_comments)}</div><div style="font-size:11px;color:var(--muted);margin-top:2px">komentáře dnes</div></div>
        <div><div style="font-size:28px;font-weight:800;letter-spacing:-1px">${dailyDiff(todayLog.followers, yestLog.followers)}</div><div style="font-size:11px;color:var(--muted);margin-top:2px">sledující dnes</div></div>
      `;
      dailySubtitle = `vs. ${yestLog.date}`;
    } else {
      dailyHtml = `
        <div><div style="font-size:28px;font-weight:800;letter-spacing:-1px">${dailyVal(todayLog.total_views)}</div><div style="font-size:11px;color:var(--muted);margin-top:2px">celkem views</div></div>
        <div><div style="font-size:28px;font-weight:800;letter-spacing:-1px">${dailyVal(todayLog.total_likes)}</div><div style="font-size:11px;color:var(--muted);margin-top:2px">celkem likes</div></div>
        <div><div style="font-size:28px;font-weight:800;letter-spacing:-1px">${dailyVal(todayLog.total_comments)}</div><div style="font-size:11px;color:var(--muted);margin-top:2px">celkem komentáře</div></div>
        <div><div style="font-size:28px;font-weight:800;letter-spacing:-1px">${dailyVal(todayLog.followers)}</div><div style="font-size:11px;color:var(--muted);margin-top:2px">sledující</div></div>
      `;
      dailySubtitle = `první sync – ${todayLog.date}`;
    }
  }

  // Plan HTML (7 days)
  const DAYS_CZ = ['Ne','Po','Út','St','Čt','Pá','So'];
  let planHtml = '';
  const todayDate = new Date();
  for (let i = 0; i < 7; i++) {
    const d = new Date(todayDate);
    d.setDate(todayDate.getDate() + i);
    const key  = d.toISOString().split('T')[0];
    const note = plan[key] || '';
    const dow  = DAYS_CZ[d.getDay()];
    const dd   = String(d.getDate()).padStart(2,'0') + '.' + String(d.getMonth()+1).padStart(2,'0') + '.';
    planHtml += `
      <div class="plan-day ${i === 0 ? 'today' : ''} ${note ? 'has-note' : ''}" onclick="openPlanModal('${handle}','${key}','${dow} ${dd}')">
        <div class="plan-date-label">
          ${i === 0 ? '<div class="plan-date-today">DNES</div>' : ''}
          <div class="plan-date-day">${dd}</div>
          <div class="plan-date-dow">${dow}</div>
        </div>
        ${note
          ? `<div class="plan-note-text">${note.replace(/\n/g,'<br>')}</div>`
          : `<div class="plan-note-empty">Nic naplánováno…</div>`}
        <button class="plan-edit-btn">✏️</button>
      </div>`;
  }

  // Top 5 reels
  const last5 = [...reels].sort((a,b) => new Date(b.posted_at||0) - new Date(a.posted_at||0)).slice(0, 5);
  const reelsListHtml = last5.length
    ? last5.map((r,i) => `
        <div class="reel-item">
          <div class="reel-num">${i+1}</div>
          <div class="reel-info">
            <div class="reel-views">${fmt(r.views)} views</div>
            <div class="reel-label">${r.description || 'reel'} · ❤️ ${fmt(r.likes||0)}</div>
          </div>
          <a class="reel-link" href="${r.url}" target="_blank">↗</a>
          <button onclick="deleteReel('${handle}','${r.id}')" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:14px;padding:0 0 0 4px;">🗑</button>
        </div>`).join('')
    : '<div class="empty"><p>Žádné reely.</p></div>';

  // Log table
  const rev = [...sorted].reverse();
  let tableHtml = '';
  if (!sorted.length) {
    tableHtml = '<div class="empty"><p>Žádné záznamy. Přidej první.</p></div>';
  } else {
    tableHtml = `<table><thead><tr>
      <th>Datum</th><th>Sledující</th><th>Δ Sledující</th><th>Poznámka</th><th></th>
    </tr></thead><tbody>`;
    rev.forEach((log, i) => {
      const prevLog = sorted[sorted.length - 1 - i - 1];
      const dF = prevLog ? log.followers - prevLog.followers : null;
      const dFH = dF !== null
        ? `<span class="${dF>0?'tag-pos':dF<0?'tag-neg':'tag-neu'}">${dF>0?'+':''}${fmt(dF)}</span>`
        : '<span class="tag-neu">—</span>';
      tableHtml += `<tr>
        <td>${log.date}</td>
        <td><strong>${fmt(log.followers)}</strong></td>
        <td>${dFH}</td>
        <td style="color:var(--muted);font-size:12px">${log.note||''}</td>
        <td><button onclick="deleteLog('${handle}','${log.id}')" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:15px;">🗑</button></td>
      </tr>`;
    });
    tableHtml += '</tbody></table>';
  }

  const chartFollId = `followersChart-${handle}`;
  const chartReelsId = `reelsChart-${handle}`;

  detail.innerHTML = `
    <div class="detail-header">
      <div style="font-size:26px">${prof.emoji}</div>
      <div class="detail-header-info">
        <h3>@${handle}</h3>
        <p>${lastSyncLabel} ${streakHtml ? '·' : ''} ${streakHtml}</p>
      </div>
      <div class="detail-actions">
        <button class="btn-ghost" onclick="exportCSV('${handle}')" style="font-size:12px;padding:6px 12px;">⬇ Export CSV</button>
        <button class="btn" onclick="openLogModal('${handle}')">+ Přidat záznam</button>
      </div>
    </div>

    <!-- 4 STAT CARDS -->
    <div class="stats-grid">
      <div class="card">
        <div class="card-icon icon-pink">👥</div>
        <div class="card-label">Sledující</div>
        <div style="position:relative;display:inline-block">
          <div class="card-value">${last ? fmt(last.followers) : '—'}</div>
          ${g7Html}
        </div>
        <div class="card-delta" style="margin-top:10px">${follDeltaHtml}</div>
      </div>

      <div class="card">
        <div class="card-icon icon-gold">🏆</div>
        <div class="card-label">Nejsledovanější reel</div>
        ${topReelHtml}
      </div>

      <div class="card">
        ${avgCardHtml}
      </div>

      <div class="card">
        <div class="card-icon" style="background:rgba(239,68,68,0.12)">📉</div>
        <div class="card-label">Nejhorší reel</div>
        ${worstReelHtml}
      </div>
    </div>

    <!-- EXTRA STATS -->
    <div class="stats-grid" style="grid-template-columns:repeat(2,1fr)">
      <div class="card">
        <div class="card-icon" style="background:rgba(131,58,180,0.15)">👁️</div>
        <div class="card-label">Celkové views</div>
        <div class="card-value">${fmt(tv)}</div>
        <div style="font-size:11px;color:var(--muted);margin-top:4px">${reels.length ? 'průměr ' + fmt(Math.round(tv/reels.length)) + ' / reel' : ''}</div>
      </div>
      <div class="card">
        <div class="card-icon" style="background:rgba(239,68,68,0.12)">❤️</div>
        <div class="card-label">Likes & komentáře</div>
        <div class="card-value">${fmt(tl)}</div>
        <div style="font-size:11px;color:var(--muted);margin-top:4px">celkové likes</div>
        <div style="height:1px;background:var(--border);margin:12px 0"></div>
        <div style="font-size:22px;font-weight:800;letter-spacing:-0.5px">${fmt(tc)}</div>
        <div style="font-size:11px;color:var(--muted);margin-top:4px">celkové komentáře</div>
      </div>
    </div>

    <!-- DAILY GROWTH -->
    ${dailyHtml ? `
    <div class="card" style="margin-bottom:24px">
      <div class="card-icon" style="background:rgba(252,176,69,0.15)">📅</div>
      <div class="card-label">Růst za dnešní den</div>
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:16px;margin-top:8px">
        ${dailyHtml}
      </div>
      <div style="font-size:11px;color:var(--muted);margin-top:10px">${dailySubtitle}</div>
    </div>
    ` : ''}

    <!-- FOLLOWERS CHART -->
    <div class="chart-card">
      <div class="chart-title">📈 Růst sledujících</div>
      <div class="chart-wrap"><canvas id="${chartFollId}"></canvas></div>
    </div>

    <!-- REELS CHART -->
    <div class="chart-card">
      <div class="chart-title">🎥 Views reelů (posledních 15)</div>
      <div class="chart-wrap"><canvas id="${chartReelsId}"></canvas></div>
    </div>

    <!-- NADPRŮMĚRNÉ REELY -->
    ${(() => {
      const avg = reels.length ? Math.round(tv / reels.length) : 0;
      const aboveAvg = [...reels]
        .filter(r => r.views > avg)
        .sort((a,b) => b.views - a.views);
      if (!aboveAvg.length) return '';
      const rows = aboveAvg.map((r, i) => {
        const date = r.posted_at ? new Date(r.posted_at).toLocaleDateString('cs-CZ', {day:'2-digit',month:'2-digit',year:'2-digit'}) : '—';
        const desc = r.description ? r.description.slice(0,40) + (r.description.length > 40 ? '…' : '') : 'reel';
        const pct = Math.round((r.views / avg - 1) * 100);
        return `<tr>
          <td style="color:var(--muted);font-size:12px;width:28px">${i+1}</td>
          <td style="font-weight:700">${fmt(r.views)}</td>
          <td><span class="tag-pos">+${pct}%</span></td>
          <td style="font-size:12px;color:var(--muted);max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${desc}</td>
          <td style="font-size:12px">❤️ ${fmt(r.likes||0)}</td>
          <td style="font-size:12px;color:var(--muted)">${date}</td>
          <td><a href="${r.url}" target="_blank" style="color:var(--accent);font-size:13px;text-decoration:none">↗</a></td>
        </tr>`;
      }).join('');
      return `
      <div class="log-card" style="margin-bottom:24px">
        <div class="log-header">
          <div class="log-title">⭐ Nadprůměrné reely <span style="font-weight:400;font-size:12px;color:var(--muted);margin-left:6px">(průměr ${fmt(avg)} views · ${aboveAvg.length} reelů)</span></div>
        </div>
        <div style="overflow-x:auto">
          <table style="width:100%">
            <thead><tr>
              <th>#</th><th>Views</th><th>vs. průměr</th><th>Popis</th><th>Likes</th><th>Datum</th><th></th>
            </tr></thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
      </div>`;
    })()}

    <!-- REELS + PLÁN -->
    <div class="bottom-grid">
      <div class="section-card">
        <div class="section-header">
          <div class="section-title">🎥 Posledních 5 reelů</div>
          <button class="btn-sm" onclick="openReelModal('${handle}')">+ Přidat</button>
        </div>
        <div>${reelsListHtml}</div>
      </div>
      <div class="section-card">
        <div class="section-header">
          <div class="section-title">📅 Plán</div>
          <span style="font-size:11px;color:var(--muted)">klikni pro úpravu</span>
        </div>
        <div class="plan-days" id="planDays-${handle}">${planHtml}</div>
      </div>
    </div>

    <!-- LOG TABLE -->
    <div class="log-card">
      <div class="log-header">
        <div class="log-title">📋 Historie záznamů</div>
        <button class="log-toggle-btn" id="logToggleBtn-${handle}" onclick="toggleLog('${handle}')">▼ Zobrazit</button>
      </div>
      <div class="log-body" id="logBody-${handle}" style="display:none">
        <div id="logTableWrap-${handle}">${tableHtml}</div>
      </div>
    </div>
  `;

  // Render charts
  renderFollowersChart(handle, sorted);
  renderReelsChart(handle, reels);
}

// ── CHARTS ────────────────────────────────────────────────────────────
function renderFollowersChart(handle, sorted) {
  const state = profileState[handle];
  const canvasId = `followersChart-${handle}`;
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  if (state.charts.followers) state.charts.followers.destroy();
  const labels   = sorted.map(l => l.date.slice(5));
  const follData = sorted.map(l => l.followers);
  state.charts.followers = new Chart(canvas, {
    type: 'line',
    data: { labels, datasets: [{ data: follData, borderColor: '#c13584', backgroundColor: 'rgba(193,53,132,0.1)', fill: true, tension: 0.4, borderWidth: 2 }] },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#7070a0', font: { size: 11 } } },
        y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#7070a0', font: { size: 11 } } }
      },
      elements: { point: { radius: sorted.length > 20 ? 0 : 3, hoverRadius: 5 } }
    }
  });
}

function renderReelsChart(handle, reels) {
  const state = profileState[handle];
  const canvasId = `reelsChart-${handle}`;
  const canvas = document.getElementById(canvasId);
  if (!canvas || !reels.length) return;
  if (state.charts.reels) state.charts.reels.destroy();
  const last15 = [...reels]
    .filter(r => r.posted_at)
    .sort((a,b) => new Date(a.posted_at) - new Date(b.posted_at))
    .slice(-15);
  const rLabels = last15.map(r => {
    const d = new Date(r.posted_at);
    return String(d.getDate()).padStart(2,'0') + '.' + String(d.getMonth()+1).padStart(2,'0') + '.';
  });
  const rData   = last15.map(r => r.views);
  const maxViews = Math.max(...reels.map(x => x.views));
  const rColors = last15.map(r => r.views === maxViews ? '#fcb045' : 'rgba(193,53,132,0.7)');
  state.charts.reels = new Chart(canvas, {
    type: 'bar',
    data: { labels: rLabels, datasets: [{ data: rData, backgroundColor: rColors, borderRadius: 6, borderSkipped: false }] },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: ctx => ' ' + fmt(ctx.raw) + ' views',
            title: (items) => {
              const r = last15[items[0].dataIndex];
              return r.description ? r.description : items[0].label;
            }
          }
        }
      },
      scales: {
        x: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#7070a0', font: { size: 11 } } },
        y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#7070a0', font: { size: 11 }, callback: v => fmt(v) } }
      }
    }
  });
}

// ── LOG TOGGLE ────────────────────────────────────────────────────────
function toggleLog(handle) {
  const body = document.getElementById('logBody-' + handle);
  const btn  = document.getElementById('logToggleBtn-' + handle);
  if (!body) return;
  const isOpen = body.style.display !== 'none';
  body.style.display = isOpen ? 'none' : 'block';
  btn.textContent = isOpen ? '▼ Zobrazit' : '▲ Skrýt';
}

// ── LOG MODAL ─────────────────────────────────────────────────────────
function openLogModal(handle) {
  _modalHandle = handle;
  document.getElementById('logDate').value      = new Date().toISOString().split('T')[0];
  document.getElementById('logFollowers').value = '';
  document.getElementById('logNote').value      = '';
  document.getElementById('logModal').classList.add('open');
}
function closeLogModal() { document.getElementById('logModal').classList.remove('open'); }
async function saveLog() {
  const date      = document.getElementById('logDate').value;
  const followers = parseInt(document.getElementById('logFollowers').value);
  const note      = document.getElementById('logNote').value.trim();
  if (!date || isNaN(followers)) { toast('Vyplň datum a sledující.', true); return; }
  const btn = document.getElementById('saveLogBtn');
  btn.disabled = true; btn.textContent = 'Ukládám…';
  const handle = _modalHandle;
  const { error } = await sb.from('logs').upsert({ date, followers, note, profile: handle }, { onConflict: 'date,profile' });
  btn.disabled = false; btn.textContent = 'Uložit';
  if (error) { toast('Chyba: ' + error.message, true); return; }
  closeLogModal();
  await loadProfileDetail(handle);
  renderDetail(handle);
  // Refresh summary card
  const sumData = await Promise.all([handle].map(async h => {
    const [lr, rr] = await Promise.all([
      sb.from('logs').select('date,followers').eq('profile', h).order('date', { ascending: true }),
      sb.from('reels').select('views,posted_at').eq('profile', h),
    ]);
    return { handle: h, logs: lr.data || [], reels: rr.data || [] };
  }));
  updateSummaryCard(handle, sumData[0]);
  toast('Záznam uložen ✓');
}
async function deleteLog(handle, id) {
  if (!confirm('Smazat záznam?')) return;
  const { error } = await sb.from('logs').delete().eq('id', id).eq('profile', handle);
  if (error) { toast('Chyba: ' + error.message, true); return; }
  await loadProfileDetail(handle);
  renderDetail(handle);
  toast('Záznam smazán');
}

// ── REEL MODAL ────────────────────────────────────────────────────────
function openReelModal(handle) {
  _modalHandle = handle;
  ['reelUrl','reelViews','reelLikes','reelDesc','reelPostedAt'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('reelPostedAt').value = new Date().toISOString().split('T')[0];
  document.getElementById('reelModal').classList.add('open');
}
function closeReelModal() { document.getElementById('reelModal').classList.remove('open'); }
async function saveReel() {
  const url    = document.getElementById('reelUrl').value.trim();
  const views  = parseInt(document.getElementById('reelViews').value);
  const likes  = parseInt(document.getElementById('reelLikes').value) || 0;
  const desc   = document.getElementById('reelDesc').value.trim();
  const datVal = document.getElementById('reelPostedAt').value;
  if (!url || isNaN(views)) { toast('Vyplň URL a views.', true); return; }
  const btn = document.getElementById('saveReelBtn');
  btn.disabled = true; btn.textContent = 'Ukládám…';
  const handle = _modalHandle;
  const { error } = await sb.from('reels').upsert(
    { url, views, likes, description: desc, profile: handle, posted_at: datVal ? datVal + 'T12:00:00Z' : new Date().toISOString() },
    { onConflict: 'url' }
  );
  btn.disabled = false; btn.textContent = 'Uložit';
  if (error) { toast('Chyba: ' + error.message, true); return; }
  closeReelModal();
  await loadProfileDetail(handle);
  renderDetail(handle);
  toast('Reel uložen ✓');
}
async function deleteReel(handle, id) {
  if (!confirm('Smazat reel?')) return;
  const { error } = await sb.from('reels').delete().eq('id', id).eq('profile', handle);
  if (error) { toast('Chyba: ' + error.message, true); return; }
  await loadProfileDetail(handle);
  renderDetail(handle);
  toast('Reel smazán');
}

// ── PLAN MODAL ────────────────────────────────────────────────────────
function openPlanModal(handle, key, label) {
  _modalHandle = handle;
  _planKey = key;
  document.getElementById('planModalTitle').textContent = '📅 ' + label;
  document.getElementById('planNote').value = profileState[handle].plan[key] || '';
  document.getElementById('planModal').classList.add('open');
}
function closePlanModal() { document.getElementById('planModal').classList.remove('open'); }
async function savePlanNote() {
  const note   = document.getElementById('planNote').value.trim();
  const btn    = document.getElementById('savePlanBtn');
  const handle = _modalHandle;
  btn.disabled = true; btn.textContent = 'Ukládám…';
  if (note) {
    const { error } = await sb.from('plan').upsert({ date: _planKey, profile: handle, note }, { onConflict: 'date,profile' });
    if (error) { toast('Chyba: ' + error.message, true); btn.disabled = false; btn.textContent = 'Uložit'; return; }
    profileState[handle].plan[_planKey] = note;
  } else {
    const { error } = await sb.from('plan').delete().eq('date', _planKey).eq('profile', handle);
    if (error) { toast('Chyba: ' + error.message, true); btn.disabled = false; btn.textContent = 'Uložit'; return; }
    delete profileState[handle].plan[_planKey];
  }
  btn.disabled = false; btn.textContent = 'Uložit';
  closePlanModal();
  // Re-render plan section only
  const DAYS_CZ = ['Ne','Po','Út','St','Čt','Pá','So'];
  const todayDate = new Date();
  const plan = profileState[handle].plan;
  let planHtml = '';
  for (let i = 0; i < 7; i++) {
    const d = new Date(todayDate);
    d.setDate(todayDate.getDate() + i);
    const key  = d.toISOString().split('T')[0];
    const note2 = plan[key] || '';
    const dow  = DAYS_CZ[d.getDay()];
    const dd   = String(d.getDate()).padStart(2,'0') + '.' + String(d.getMonth()+1).padStart(2,'0') + '.';
    planHtml += `
      <div class="plan-day ${i === 0 ? 'today' : ''} ${note2 ? 'has-note' : ''}" onclick="openPlanModal('${handle}','${key}','${dow} ${dd}')">
        <div class="plan-date-label">
          ${i === 0 ? '<div class="plan-date-today">DNES</div>' : ''}
          <div class="plan-date-day">${dd}</div>
          <div class="plan-date-dow">${dow}</div>
        </div>
        ${note2
          ? `<div class="plan-note-text">${note2.replace(/\n/g,'<br>')}</div>`
          : `<div class="plan-note-empty">Nic naplánováno…</div>`}
        <button class="plan-edit-btn">✏️</button>
      </div>`;
  }
  const planWrap = document.getElementById('planDays-' + handle);
  if (planWrap) planWrap.innerHTML = planHtml;
  toast('Plán uložen ✓');
}
async function clearPlanNote() {
  const handle = _modalHandle;
  const { error } = await sb.from('plan').delete().eq('date', _planKey).eq('profile', handle);
  if (error) { toast('Chyba: ' + error.message, true); return; }
  delete profileState[handle].plan[_planKey];
  closePlanModal();
  // Trigger re-render plan
  const evt = { handle };
  savePlanNote._clearMode = true;
  toast('Plán smazán');
  // Just re-render plan section
  const DAYS_CZ = ['Ne','Po','Út','St','Čt','Pá','So'];
  const todayDate = new Date();
  const plan = profileState[handle].plan;
  let planHtml = '';
  for (let i = 0; i < 7; i++) {
    const d = new Date(todayDate);
    d.setDate(todayDate.getDate() + i);
    const key  = d.toISOString().split('T')[0];
    const note2 = plan[key] || '';
    const dow  = DAYS_CZ[d.getDay()];
    const dd   = String(d.getDate()).padStart(2,'0') + '.' + String(d.getMonth()+1).padStart(2,'0') + '.';
    planHtml += `
      <div class="plan-day ${i === 0 ? 'today' : ''} ${note2 ? 'has-note' : ''}" onclick="openPlanModal('${handle}','${key}','${dow} ${dd}')">
        <div class="plan-date-label">
          ${i === 0 ? '<div class="plan-date-today">DNES</div>' : ''}
          <div class="plan-date-day">${dd}</div>
          <div class="plan-date-dow">${dow}</div>
        </div>
        ${note2
          ? `<div class="plan-note-text">${note2.replace(/\n/g,'<br>')}</div>`
          : `<div class="plan-note-empty">Nic naplánováno…</div>`}
        <button class="plan-edit-btn">✏️</button>
      </div>`;
  }
  const planWrap = document.getElementById('planDays-' + handle);
  if (planWrap) planWrap.innerHTML = planHtml;
}

// ── UPDATE SUMMARY CARD ───────────────────────────────────────────────
function updateSummaryCard(handle, sum) {
  const sortedLogs = [...sum.logs].sort((a,b) => a.date.localeCompare(b.date));
  const last = sortedLogs[sortedLogs.length - 1];
  const prev7cut = new Date(); prev7cut.setDate(prev7cut.getDate() - 7);
  const base7 = [...sortedLogs].reverse().find(l => new Date(l.date) <= prev7cut);
  // Re-render the full accordion summary (simpler: just reload)
  // For now we'll do a full re-render of the summary part
  const acc = document.getElementById('accordion-' + handle);
  if (!acc) return;
  const summaryEl = acc.querySelector('.profile-summary');
  if (!summaryEl) return;
  const prof = PROFILES.find(p => p.handle === handle);
  let growthBadge = '';
  if (last && base7 && base7.followers > 0) {
    const pct = ((last.followers - base7.followers) / base7.followers * 100);
    const cls = pct >= 0 ? '' : ' neg';
    const sign = pct >= 0 ? '+' : '';
    growthBadge = `<div class="growth-badge${cls}" data-tip="Sledující: ${base7.followers.toLocaleString('cs')} → ${last.followers.toLocaleString('cs')}">${sign}${pct.toFixed(1)}% 7d</div>`;
  }
  const avgViews = sum.reels.length
    ? Math.round(sum.reels.reduce((s,r) => s + (r.views||0), 0) / sum.reels.length)
    : null;
  summaryEl.innerHTML = `
    <div class="profile-emoji">${prof.emoji}</div>
    <div class="profile-info">
      <div class="profile-handle">@${handle}</div>
      <div class="profile-label">${prof.label}</div>
    </div>
    <div class="profile-stats">
      <div class="pstat">
        <div class="pstat-val">${last ? fmt(last.followers) : '—'}</div>
        <div class="pstat-label">Sledující</div>
      </div>
      <div class="pstat" style="min-width:80px">
        ${growthBadge}
        ${!growthBadge ? '<div class="pstat-val" style="font-size:13px;color:var(--muted)">—</div>' : ''}
      </div>
      <div class="pstat">
        <div class="pstat-val">${avgViews !== null ? fmt(avgViews) : '—'}</div>
        <div class="pstat-label">Ø Views</div>
      </div>
    </div>
    <div class="accordion-arrow">▼</div>
  `;
  summaryEl.onclick = () => toggleAccordion(handle);
}

// ── EXPORT ────────────────────────────────────────────────────────────
function exportCSV(handle) {
  const state  = profileState[handle];
  const sorted = [...state.logs].sort((a,b) => a.date.localeCompare(b.date));
  let csv = 'Datum,Sledujici,Poznamka\n';
  sorted.forEach(l => { csv += `${l.date},${l.followers},"${l.note||''}"\n`; });
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
  a.download = `ig-tracker-${handle}.csv`; a.click();
}

// ── CLOSE ON OVERLAY CLICK ────────────────────────────────────────────
['logModal','reelModal','planModal'].forEach(id => {
  document.getElementById(id).addEventListener('click', e => {
    if (e.target === e.currentTarget) e.currentTarget.classList.remove('open');
  });
});

// ── INIT ─────────────────────────────────────────────────────────────
(async function init() {
  try {
    const summaries = await loadAllSummaries();
    renderProfilesList(summaries);
    document.getElementById('loadingOverlay').style.display = 'none';
    document.getElementById('appContent').style.display = 'block';
  } catch(e) {
    document.querySelector('.loading-text').textContent = 'Chyba připojení: ' + e.message;
    console.error(e);
  }
})();
</script>
